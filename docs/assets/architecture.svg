<svg viewBox="0 0 980 820" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif" role="img" aria-label="Multi-agent VLM optimization system architecture with human operator layer">
  <title>Multi-agent VLM optimization system architecture</title>
  <desc>A human operator interacts through an operator console (goal and scope intake, status dashboard, approvals and gates, run controls) that sits above the system. The Search Strategist agent proposes config experiments or student-construction specs; deterministic services run, evaluate same-path, and record to the experiment ledger; the Pareto tracker and threshold monitor read it and the agent re-routes. Mode B (Research Analyst, technique registry) is planned. Today the console is chat plus CLI; a unified GUI is planned.</desc>
  <style>
    .th{font-size:14px;font-weight:500}
    .ts{font-size:12px}
    .lbl{font-size:12px;fill:#5b6470}
    .built rect{fill:#e6f4ea;stroke:#2f9e57;stroke-width:1.5}
    .built .th{fill:#1b5e34}.built .ts{fill:#2f7d4d}
    .partial rect{fill:#fbf0d6;stroke:#cf9a2c;stroke-width:1.5}
    .partial .th{fill:#7a5a12}.partial .ts{fill:#8a6a1c}
    .planned rect{fill:#eef0f2;stroke:#9aa3ad;stroke-width:1.5;stroke-dasharray:5 4}
    .planned .th{fill:#3f4750}.planned .ts{fill:#5b6470}
    .actor rect{fill:#ffffff;stroke:#3f4750;stroke-width:1.6}
    .actor .th{fill:#1f2937}.actor .ts{fill:#5b6470}
    .arr{fill:none;stroke:#6b7280;stroke-width:1.5}
    .fb{fill:none;stroke:#9aa3ad;stroke-width:1.5;stroke-dasharray:5 4}
    .div{stroke:#c8ced5;stroke-width:1}
  </style>
  <defs><marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker></defs>

  <g transform="translate(40,18)">
    <rect x="0" y="0" width="13" height="13" rx="3" fill="#e6f4ea" stroke="#2f9e57" stroke-width="1.5"/><text x="19" y="11" class="lbl">built</text>
    <rect x="100" y="0" width="13" height="13" rx="3" fill="#fbf0d6" stroke="#cf9a2c" stroke-width="1.5"/><text x="119" y="11" class="lbl">partial</text>
    <rect x="232" y="0" width="13" height="13" rx="3" fill="#eef0f2" stroke="#9aa3ad" stroke-width="1.5" stroke-dasharray="5 4"/><text x="251" y="11" class="lbl">planned</text>
    <rect x="700" y="0" width="13" height="13" rx="3" fill="#ffffff" stroke="#3f4750" stroke-width="1.6"/><text x="719" y="11" class="lbl">human / interface</text>
  </g>

  <g class="actor"><rect x="40" y="62" width="124" height="64" rx="6"/>
    <text x="102" y="89" text-anchor="middle" class="th">Human operator</text>
    <text x="102" y="108" text-anchor="middle" class="ts">you · chat/CLI today</text></g>
  <line class="arr" x1="164" y1="94" x2="206" y2="94" marker-start="url(#arrow)" marker-end="url(#arrow)"/>

  <g class="planned"><rect x="208" y="70" width="168" height="48" rx="6"/>
    <text x="292" y="91" text-anchor="middle" class="th">Goal &amp; scope intake</text>
    <text x="292" y="108" text-anchor="middle" class="ts">start: goals, eval set</text></g>
  <g class="partial"><rect x="392" y="70" width="160" height="48" rx="6"/>
    <text x="472" y="91" text-anchor="middle" class="th">Status dashboard</text>
    <text x="472" y="108" text-anchor="middle" class="ts">progress · logs · Pareto</text></g>
  <g class="planned"><rect x="568" y="70" width="172" height="48" rx="6"/>
    <text x="654" y="91" text-anchor="middle" class="th">Approvals &amp; gates</text>
    <text x="654" y="108" text-anchor="middle" class="ts">deploy · spec · escalate</text></g>
  <g class="planned"><rect x="756" y="70" width="170" height="48" rx="6"/>
    <text x="841" y="91" text-anchor="middle" class="th">Run controls</text>
    <text x="841" y="108" text-anchor="middle" class="ts">pause · stop · kill</text></g>

  <text x="567" y="140" text-anchor="middle" class="lbl">Operator console — chat + CLI today; unified GUI planned (the dashboard is partial)</text>
  <line class="div" x1="30" y1="156" x2="950" y2="156"/>

  <path class="fb" d="M430 158 L430 196" marker-end="url(#arrow)"/>
  <path class="fb" d="M548 196 L548 158" marker-end="url(#arrow)"/>
  <text x="416" y="182" text-anchor="end" class="lbl">goals · approvals · stop/kill</text>
  <text x="562" y="182" text-anchor="start" class="lbl">status · rationale · dossier</text>

  <line class="arr" x1="400" y1="256" x2="332" y2="304" marker-end="url(#arrow)"/>
  <line class="arr" x1="492" y1="256" x2="548" y2="304" marker-end="url(#arrow)"/>
  <line class="arr" x1="325" y1="348" x2="325" y2="392" marker-end="url(#arrow)"/>
  <line class="arr" x1="547" y1="348" x2="547" y2="392" marker-end="url(#arrow)"/>
  <line class="arr" x1="332" y1="452" x2="416" y2="498" marker-end="url(#arrow)"/>
  <line class="arr" x1="540" y1="452" x2="460" y2="498" marker-end="url(#arrow)"/>
  <line class="arr" x1="432" y1="552" x2="432" y2="590" marker-end="url(#arrow)"/>
  <line class="arr" x1="330" y1="618" x2="246" y2="618" marker-end="url(#arrow)"/>
  <line class="arr" x1="536" y1="618" x2="620" y2="618" marker-end="url(#arrow)"/>
  <line class="arr" x1="822" y1="256" x2="822" y2="294" marker-end="url(#arrow)"/>
  <path class="arr" d="M715 318 L539 232" marker-end="url(#arrow)"/>
  <path class="arr" d="M330 632 L262 690" marker-end="url(#arrow)"/>
  <path class="fb" d="M162 594 C 138 420, 235 230, 328 230" marker-end="url(#arrow)"/>
  <text x="150" y="410" class="lbl" transform="rotate(-90,150,410)">re-route</text>

  <g class="built"><rect x="330" y="200" width="206" height="56" rx="6"/>
    <text x="433" y="225" text-anchor="middle" class="th">Search strategist agent</text>
    <text x="433" y="243" text-anchor="middle" class="ts">proposes experiments + specs</text></g>
  <g class="planned"><rect x="715" y="200" width="215" height="56" rx="6"/>
    <text x="822" y="225" text-anchor="middle" class="th">Research analyst agent</text>
    <text x="822" y="243" text-anchor="middle" class="ts">mode B · phase 3</text></g>
  <g class="planned"><rect x="715" y="296" width="215" height="50" rx="6"/>
    <text x="822" y="320" text-anchor="middle" class="th">Technique registry</text>
    <text x="822" y="338" text-anchor="middle" class="ts">search space · the seam</text></g>

  <g class="built"><rect x="245" y="304" width="160" height="44" rx="6"/>
    <text x="325" y="331" text-anchor="middle" class="th">Experiment queue</text></g>
  <g class="built"><rect x="452" y="304" width="190" height="44" rx="6"/>
    <text x="547" y="331" text-anchor="middle" class="th">Construction queue</text></g>

  <g class="built"><rect x="245" y="392" width="160" height="60" rx="6"/>
    <text x="325" y="418" text-anchor="middle" class="th">Experiment runner</text>
    <text x="325" y="437" text-anchor="middle" class="ts">config → run → metrics</text></g>
  <g class="built"><rect x="452" y="392" width="190" height="60" rx="6"/>
    <text x="547" y="418" text-anchor="middle" class="th">Construction loop</text>
    <text x="547" y="437" text-anchor="middle" class="ts">assemble · align · distill</text></g>

  <g class="built"><rect x="330" y="498" width="206" height="54" rx="6"/>
    <text x="433" y="524" text-anchor="middle" class="th">Evaluation harness</text>
    <text x="433" y="543" text-anchor="middle" class="ts">same-path MCQ eval</text></g>

  <g class="built"><rect x="330" y="590" width="206" height="54" rx="6"/>
    <text x="433" y="615" text-anchor="middle" class="th">Experiment ledger</text>
    <text x="433" y="634" text-anchor="middle" class="ts">metrics.db · content-addressed</text></g>
  <g class="built"><rect x="80" y="592" width="166" height="52" rx="6"/>
    <text x="163" y="616" text-anchor="middle" class="th">Pareto tracker</text>
    <text x="163" y="635" text-anchor="middle" class="ts">per-device frontier</text></g>
  <g class="partial"><rect x="620" y="592" width="216" height="52" rx="6"/>
    <text x="728" y="616" text-anchor="middle" class="th">Threshold monitor</text>
    <text x="728" y="635" text-anchor="middle" class="ts">+ decision dossier (scaffold)</text></g>

  <g class="partial"><rect x="80" y="690" width="186" height="48" rx="6"/>
    <text x="173" y="711" text-anchor="middle" class="th">Deployment dispatcher</text>
    <text x="173" y="729" text-anchor="middle" class="ts">iPhone-ready flag · manual</text></g>

  <text x="490" y="772" text-anchor="middle" class="lbl">Mode A loop (built): propose → run / construct → eval same-path → ledger → Pareto → re-route</text>
  <text x="490" y="792" text-anchor="middle" class="lbl">Mode B (planned): Research analyst → technique registry; human gates escalation via the console</text>
</svg>
