<svg viewBox="0 0 920 552" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif" role="img" aria-label="Operator console screenshot mockup">
  <title>Operator console</title>
  <desc>The operator console: a top bar with run state, backend indicator, and approvals count; a Monitor view with pause/resume/stop/kill controls, current-run metrics, recent constructed-student scores, a pending-approval card, and a live log; and a docked strategist chat.</desc>
  <style>
    .t{fill:#1f2430;font-size:13px}.tb{fill:#1f2430;font-size:15px;font-weight:500}
    .s{fill:#5b6470;font-size:12px}.m{fill:#5b6470;font-size:11.5px;font-family:ui-monospace,Menlo,Consolas,monospace}
    .btn{fill:#ffffff;stroke:#d0d5dd;stroke-width:1}
    .card{fill:#f3f4f6}
    .win{fill:#ffffff;stroke:#d0d5dd;stroke-width:1}
  </style>

  <rect class="win" x="8" y="8" width="904" height="536" rx="10"/>
  <path d="M8 18 a10 10 0 0 1 10 -10 h884 a10 10 0 0 1 10 10 v22 h-904 z" fill="#f5f6f8"/>
  <circle cx="28" cy="24" r="5" fill="#e0a0a0"/><circle cx="46" cy="24" r="5" fill="#ecd08a"/><circle cx="64" cy="24" r="5" fill="#a8d3a8"/>
  <text x="86" y="28" class="m">operator console — localhost:8501</text>

  <text x="26" y="66" class="tb">Operator console</text>
  <rect x="470" y="52" width="78" height="22" rx="6" fill="#e6f4ea"/><text x="484" y="67" font-size="12" fill="#1b5e34">running</text>
  <text x="560" y="67" class="s">backend: local · Qwen2.5-7B</text>
  <rect x="786" y="52" width="104" height="22" rx="6" fill="#fbf0d6"/><text x="800" y="67" font-size="12" fill="#7a5a12">approvals · 1</text>
  <line x1="20" y1="84" x2="900" y2="84" stroke="#e6e9ee"/>

  <text x="26" y="106" class="s">run control</text>
  <g>
    <rect class="btn" x="26" y="114" width="86" height="28" rx="6"/><text x="50" y="132" class="t">pause</text>
    <rect class="btn" x="120" y="114" width="86" height="28" rx="6"/><text x="140" y="132" class="t">resume</text>
    <rect class="btn" x="214" y="114" width="66" height="28" rx="6"/><text x="234" y="132" class="t">stop</text>
    <rect x="288" y="114" width="66" height="28" rx="6" fill="#ffffff" stroke="#e0a0a0"/><text x="308" y="132" font-size="13" fill="#a32d2d">kill</text>
    <rect class="btn" x="362" y="114" width="66" height="28" rx="6"/><text x="380" y="132" class="t">clear</text>
  </g>

  <text x="26" y="172" class="s">current run · P2-B1 · df64c49b</text>
  <g>
    <rect class="card" x="26" y="180" width="138" height="54" rx="8"/><text x="40" y="202" class="s">stage</text><text x="40" y="222" class="tb">distill</text>
    <rect class="card" x="172" y="180" width="138" height="54" rx="8"/><text x="186" y="202" class="s">step</text><text x="186" y="222" class="tb">640/1000</text>
    <rect class="card" x="318" y="180" width="138" height="54" rx="8"/><text x="332" y="202" class="s">loss</text><text x="332" y="222" class="tb">0.74</text>
    <rect class="card" x="464" y="180" width="138" height="54" rx="8"/><text x="478" y="202" class="s">queue</text><text x="478" y="222" class="tb">1</text>
  </g>

  <text x="26" y="262" class="s">recent constructed students</text>
  <text x="26" y="284" class="s">id</text><text x="120" y="284" class="s">hypothesis</text><text x="230" y="284" class="s">status</text><text x="330" y="284" class="s">POPE</text><text x="412" y="284" class="s">RWQA</text><text x="496" y="284" class="s">MMBench</text>
  <line x1="26" y1="292" x2="602" y2="292" stroke="#e6e9ee"/>
  <text x="26" y="312" class="m">df64c49b</text><text x="120" y="312" class="t">P2-B1</text><text x="230" y="312" class="t">built</text>
  <text x="330" y="312" font-size="13" fill="#a32d2d">0.0</text><text x="412" y="312" font-size="13" fill="#a32d2d">0.0</text><text x="496" y="312" font-size="13" fill="#a32d2d">0.0</text>

  <rect x="26" y="328" width="576" height="40" rx="8" fill="#ffffff" stroke="#9cc0e8"/>
  <text x="40" y="346" class="t">1 approval blocks this run — approve P2-B1 scale-up spec</text>
  <rect x="40" y="350" width="64" height="14" rx="4" fill="none"/>
  <text x="40" y="362" font-size="11.5" fill="#185fa5">[ approve ]   [ reject ]   · same item as the bell &amp; Approvals tab</text>

  <text x="26" y="392" class="s">live log</text>
  <rect x="26" y="400" width="576" height="120" rx="8" fill="#f5f6f8"/>
  <text x="40" y="424" class="m">[distill] step 639/1000  loss=0.29</text>
  <text x="40" y="446" class="m">[distill] step 640/1000  loss=0.74</text>
  <text x="40" y="468" class="m">  align loss plateaued at 2.38</text>
  <text x="40" y="490" class="m">  ↻ re-route queued on completion</text>

  <rect x="620" y="104" width="276" height="416" rx="10" fill="#f5f6f8"/>
  <text x="638" y="130" class="tb">Chat — strategist</text>
  <text x="638" y="148" class="s">local · Qwen2.5-7B</text>
  <rect x="638" y="160" width="240" height="64" rx="8" fill="#ffffff" stroke="#e0e3e8"/>
  <text x="652" y="182" class="t">Alignment plateaued at 2.38 —</text>
  <text x="652" y="202" class="t">I'd propose more align steps.</text>
  <text x="652" y="217" class="s">proposes &amp; explains; no gated action</text>
  <rect x="718" y="236" width="160" height="34" rx="8" fill="#e6f1fb"/><text x="734" y="257" font-size="13" fill="#0c447c">yes, draft the spec</text>
  <rect x="638" y="284" width="240" height="32" rx="8" fill="#ffffff" stroke="#d0d5dd"/><text x="652" y="304" class="s">ask anywhere…</text>
  <text x="638" y="338" class="s">docked · available on every tab</text>
  <line x1="638" y1="358" x2="878" y2="358" stroke="#e6e9ee"/>
  <text x="638" y="380" class="s">run log</text>
  <rect x="638" y="388" width="240" height="30" rx="8" fill="#ffffff" stroke="#d0d5dd"/><text x="652" y="407" class="m">/tmp/b13_build.log</text>
  <rect class="btn" x="638" y="428" width="240" height="30" rx="8"/><text x="740" y="447" class="t">↻ refresh</text>
</svg>
